spring:
  threads:
    virtual:
      enabled: true
  application:
    name: loyalty

  datasource:
    url: jdbc:h2:mem:mydb
    username: sa
    password: password
    driverClassName: org.h2.Driver

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create
    defer-datasource-initialization: true
    open-in-view: false

  sql:
    init:
      mode: always
server:
  port: 8092
