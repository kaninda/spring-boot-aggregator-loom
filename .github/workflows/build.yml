name: Java build

on:
  push:
    branches:
    - master
    - 'feature/**'
  pull_request:
    branches:
    - master

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up JDK 21 and Maven settings
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '21'
        cache: maven
        server-id: github
        server-username: GITHUB_ACTOR
        server-password: GITHUB_TOKEN

    - name: Show Maven version
      run: mvn -version

    - name: Build and test
      run: mvn -B clean verify

    - name: Publish SNAPSHOT packages on master
      if: github.ref == 'refs/heads/master'
      run: mvn -B deploy -DskipTests
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Login to GHCR
      if: github.ref == 'refs/heads/master'
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build image
      if: github.ref == 'refs/heads/master'
      run: |
        mvn -pl user-service -am spring-boot:build-image \
          -Dspring-boot.build-image.imageName=ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }}

    - name: Push image
      if: github.ref == 'refs/heads/master'
      run: docker push ghcr.io/${{ github.repository_owner }}/user-service:${{ github.sha }}